<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一元二次方程求解器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- 配置Tailwind自定义颜色和字体 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                        accent: '#8B5CF6',
                        neutral: '#64748B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .equation-display {
                @apply text-xl md:text-2xl font-medium text-gray-800 my-3 p-3 bg-gray-50 rounded-lg border border-gray-200;
            }
            .input-field {
                @apply w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all duration-200 outline-none;
            }
            .result-card {
                @apply bg-white rounded-xl shadow-md p-5 transition-all duration-300 hover:shadow-lg;
            }
            .btn-calculate {
                @apply bg-primary hover:bg-primary/90 text-white font-medium py-3 px-6 rounded-lg transition-all duration-200 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-primary/50;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-purple-50 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <!-- 标题区域 -->
        <header class="text-center mb-10">
            <h1 class="text-[clamp(1.8rem,5vw,2.5rem)] font-bold text-gray-800 mb-2">一元二次方程求解器</h1>
            <p class="text-neutral text-lg">输入方程 ax² + bx + c = 0 的系数，获取解和计算步骤</p>
        </header>
        
        <!-- 主要内容区 -->
        <main class="bg-white rounded-2xl shadow-xl p-6 md:p-8 mb-8">
            <!-- 方程形式展示 -->
            <div class="equation-display text-center">
                ax² + bx + c = 0
            </div>
            
            <!-- 输入区域 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div class="space-y-2">
                    <label for="a" class="block text-gray-700 font-medium">系数 a</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">x²</span>
                        <input type="number" id="a" class="input-field pl-8" placeholder="输入a的值" required>
                    </div>
                </div>
                
                <div class="space-y-2">
                    <label for="b" class="block text-gray-700 font-medium">系数 b</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">x</span>
                        <input type="number" id="b" class="input-field pl-8" placeholder="输入b的值" required>
                    </div>
                </div>
                
                <div class="space-y-2">
                    <label for="c" class="block text-gray-700 font-medium">系数 c</label>
                    <input type="number" id="c" class="input-field" placeholder="输入c的值" required>
                </div>
            </div>
            
            <!-- 计算按钮 -->
            <div class="text-center mb-8">
                <button id="calculate" class="btn-calculate">
                    <i class="fa fa-calculator mr-2"></i>计算结果
                </button>
            </div>
            
            <!-- 结果展示区域 -->
            <div id="result" class="hidden">
                <!-- 方程信息 -->
                <div class="result-card mb-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-3 flex items-center">
                        <i class="fa fa-equation text-accent mr-2"></i>方程信息
                    </h2>
                    <p id="equation-info" class="text-gray-700"></p>
                </div>
                
                <!-- 判别式 -->
                <div class="result-card mb-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-3 flex items-center">
                        <i class="fa fa-balance-scale text-accent mr-2"></i>判别式
                    </h2>
                    <p id="discriminant" class="text-gray-700"></p>
                </div>
                
                <!-- 求解步骤 -->
                <div class="result-card mb-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-3 flex items-center">
                        <i class="fa fa-list-ol text-accent mr-2"></i>求解步骤
